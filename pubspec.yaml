name: benguet_harvest
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # Database
  supabase_flutter: ^2.5.0

  # Offline cache
  sqflite: ^2.3.2
  sqflite_common_ffi: ^2.3.3
  path: ^1.9.0

  # Maps and GPS
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^12.0.0
  flutter_compass: ^0.8.1

  # Push notifications
  onesignal_flutter: ^5.2.6

  # Charts
  fl_chart: ^0.69.0

  # Security
  bcrypt: ^1.1.3
  local_auth: ^2.3.0

  # Utilities
  url_launcher: ^6.3.0
  http: ^1.2.2
  connectivity_plus: ^6.0.5
  shared_preferences: ^2.3.2
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  msix: ^3.16.7

flutter:
  uses-material-design: true

msix_config:
  display_name: Benguet Harvest
  publisher_display_name: Benguet Harvest
  identity_name: com.benguetharvest.app
  msix_version: 1.0.0.0
  description: Market prices, road conditions and supply tracking for Benguet farmers
  languages: en-us
  capabilities: 'internetClient, location'